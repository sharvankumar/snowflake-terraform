name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - 'envs/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'envs/**'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: envs/dev
  TERRAFORM_VERSION: "1.14.7"

jobs:
  # -------------------------------------------------------
  # PLAN — runs on every pull request
  # Shows what Terraform would change, posts as PR comment
  # -------------------------------------------------------
  plan:
    name: Terraform Plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Create terraform.tfvars from secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          snowflake_organization_name = "${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}"
          snowflake_account_name      = "${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}"
          snowflake_user              = "${{ secrets.SNOWFLAKE_USER }}"
          database_name               = "ECOM_ANALYTICS"
          schema_name                 = "SALES"
          warehouse_name              = "ECOM_ANALYTICS_WH"
          service_user_name           = "ECOM_ANALYTICS_SVC"
          warehouse_size              = "XSMALL"
          EOF

      - name: Write Snowflake private key
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > snowflake_key.p8
          chmod 600 snowflake_key.p8
          echo 'snowflake_private_key_path = "./snowflake_key.p8"' >> terraform.tfvars

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -no-color
        continue-on-error: true

      - name: Post plan to PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const outcome = '${{ steps.plan.outcome }}';
            const body = `### Terraform Plan — \`${outcome}\`
            
            <details><summary>Show plan output</summary>

            \`\`\`
            ${plan.substring(0, 65000)}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # -------------------------------------------------------
  # APPLY — runs only when merged to main
  # Requires manual approval in GitHub Actions UI before executing.
  # Setup: GitHub repo → Settings → Environments → "production"
  #        → Add required reviewer (yourself)
  # -------------------------------------------------------
  apply:
    name: Terraform Apply
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Create terraform.tfvars from secrets
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > terraform.tfvars <<EOF
          snowflake_organization_name = "${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}"
          snowflake_account_name      = "${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}"
          snowflake_user              = "${{ secrets.SNOWFLAKE_USER }}"
          database_name               = "ECOM_ANALYTICS"
          schema_name                 = "SALES"
          warehouse_name              = "ECOM_ANALYTICS_WH"
          service_user_name           = "ECOM_ANALYTICS_SVC"
          warehouse_size              = "XSMALL"
          EOF

      - name: Write Snowflake private key
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > snowflake_key.p8
          chmod 600 snowflake_key.p8
          echo 'snowflake_private_key_path = "./snowflake_key.p8"' >> terraform.tfvars

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve
